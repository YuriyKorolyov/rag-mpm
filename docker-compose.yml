services:

  # ─── FastAPI RAG API ────────────────────────────────────────────────────────
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
    volumes:
      - ./uploads:/uploads
      - ./app:/app          # hot-reload при разработке
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-net

  # ─── Qdrant Vector DB ───────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-net

  # ─── Ollama (nomic-embed-text + qwen3:0.6b) ─────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-net

  # ─── Ollama Init: скачать модели при первом запуске ─────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: rag-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        echo '>>> Pulling nomic-embed-text...' &&
        ollama pull nomic-embed-text &&
        echo '>>> Pulling qwen3:0.6b...' &&
        ollama pull qwen3:0.6b &&
        echo '>>> All models ready.'
      "
    networks:
      - rag-net
    restart: "no"

volumes:
  qdrant_data:
  ollama_data:

networks:
  rag-net:
    driver: bridge
