services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      LOG_LEVEL: INFO
    volumes:
      - ./uploads:/uploads
      - ./app:/app
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped
    networks:
      - rag-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - rag-net

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - rag-net

  ollama-init:
    image: ollama/ollama:latest
    container_name: rag-ollama-init
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        ollama pull nomic-embed-text &&
        ollama pull sorc/qwen3.5-instruct:0.8b &&
        exit 0
      "
    networks:
      - rag-net
    restart: "no"

volumes:
  qdrant_data:
  ollama_data:
  huggingface_cache:

networks:
  rag-net:
    driver: bridge
